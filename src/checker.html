<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Print Quality Check — Xpress Printing Toolkit</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page">
  <header class="bar">
    <div class="logo">XP</div>
    <h1 id="bizName">XPRESS PRINTING</h1>
  </header>

  <h2 class="section" data-i18n="checker">Checker</h2>
  <div class="card">
    <div class="drop" id="drop">
      <div data-i18n="dropImage">Drop an image here or click to choose</div>
      <input id="file" type="file" accept="image/*" hidden>
    </div>
    <div class="checkResult" id="checkResult"></div>
  </div>

  <script src="shared.js"></script>
  <script src="checker-core.js"></script>
  <script src="checker.js"></script>
</body>
</html>
