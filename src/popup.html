<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Xpress Printing Toolkit</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="popup">
  <header class="bar">
    <div class="logo">XP</div>
    <h1 id="bizName">XPRESS PRINTING</h1>
    <select id="langSel" title="Language">
      <option value="en">EN</option>
      <option value="sw">SW</option>
    </select>
  </header>

  <nav class="tabs">
    <button id="tabQuote" class="active" data-i18n="quote">Quote</button>
    <button id="tabChecker" data-i18n="checker">Checker</button>
    <button id="tabSettings" data-i18n="settings">Settings</button>
  </nav>

  <!-- QUOTE -->
  <section id="paneQuote" class="pane active">
    <label class="field"><span data-i18n="service">Service</span>
      <select id="svc"></select>
    </label>
    <div class="row" id="dimRow">
      <label class="field"><span data-i18n="width">Width (m)</span>
        <input id="w" type="number" min="0" step="0.1" value="1">
      </label>
      <label class="field"><span data-i18n="height">Height (m)</span>
        <input id="h" type="number" min="0" step="0.1" value="1">
      </label>
    </div>
    <label class="field"><span data-i18n="quantity">Quantity</span>
      <input id="qty" type="number" min="1" step="1" value="1">
    </label>
    <div class="linePreview" id="linePreview">—</div>
    <div class="row">
      <button class="primary" id="addLine" data-i18n="addLine">Add to quote</button>
      <button class="ghost" id="clearQuote" data-i18n="clearQuote">Clear</button>
    </div>

    <h2 class="section" style="margin:14px 0 2px" data-i18n="quoteLines">Quote lines</h2>
    <ul class="quoteLines" id="quoteLines"></ul>
    <div class="grand"><span data-i18n="total">Total</span><span id="grandTotal">0 TZS</span></div>
    <button class="wa" id="sendWa" data-i18n="sendWhatsApp">Send via WhatsApp</button>
    <button class="ghost" id="copyQuote" style="width:100%;margin-top:6px" data-i18n="copyQuote">Copy quote</button>
    <div class="mutedNote" id="quoteNote"></div>
  </section>

  <!-- CHECKER -->
  <section id="paneChecker" class="pane">
    <div class="drop" id="drop">
      <div data-i18n="dropImage">Drop an image here or click to choose</div>
      <input id="file" type="file" accept="image/*" hidden>
    </div>
    <div class="mutedNote" data-i18n="orRightClick"></div>
    <div class="checkResult" id="checkResult"></div>
  </section>

  <script src="shared.js"></script>
  <script src="checker-core.js"></script>
  <script src="popup.js"></script>
</body>
</html>
