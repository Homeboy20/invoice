<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign up — PrintDesk</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="authPage">
  <div class="authCard">
    <div class="brand"><div class="logo">PD</div><span>PrintDesk</span></div>
    <h2>Create your shop's account</h2>
    <p class="sub">Free to start. Your data is private to your business.</p>

    <label class="field"><span>Business name</span>
      <input id="businessName" type="text" placeholder="e.g. Moshi Fast Print" autocomplete="organization">
    </label>
    <label class="field"><span>Email</span>
      <input id="email" type="email" placeholder="you@yourshop.co.tz" autocomplete="email">
    </label>
    <label class="field"><span>Password (min. 8 characters)</span>
      <input id="password" type="password" autocomplete="new-password">
    </label>
    <button class="primary" id="submit" style="width:100%">Create account</button>
    <div class="errorMsg" id="err"></div>

    <div class="switchLink">Already have an account? <a href="login.html">Log in</a></div>
  </div>

  <script src="app.js"></script>
  <script>
    document.getElementById('submit').addEventListener('click', async () => {
      const businessName = document.getElementById('businessName').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const err = document.getElementById('err');
      err.textContent = '';
      const btn = document.getElementById('submit');
      btn.disabled = true;
      try {
        const data = await pdApi('/auth/register', { method: 'POST', body: { businessName, email, password } });
        pdSetToken(data.token);
        location.href = 'dashboard.html';
      } catch (e) {
        err.textContent = e.message;
      } finally {
        btn.disabled = false;
      }
    });
    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('submit').click();
    });
  </script>
</body>
</html>
