<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Log in — PrintDesk</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="authPage">
  <div class="authCard">
    <div class="brand"><div class="logo">PD</div><span>PrintDesk</span></div>
    <h2>Welcome back</h2>
    <p class="sub">Log in to your shop's account.</p>

    <label class="field"><span>Email</span>
      <input id="email" type="email" autocomplete="email">
    </label>
    <label class="field"><span>Password</span>
      <input id="password" type="password" autocomplete="current-password">
    </label>
    <button class="primary" id="submit" style="width:100%">Log in</button>
    <div class="errorMsg" id="err"></div>

    <div class="switchLink">New here? <a href="register.html">Create an account</a></div>
  </div>

  <script src="app.js"></script>
  <script>
    document.getElementById('submit').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const err = document.getElementById('err');
      err.textContent = '';
      const btn = document.getElementById('submit');
      btn.disabled = true;
      try {
        const data = await pdApi('/auth/login', { method: 'POST', body: { email, password } });
        pdSetToken(data.token);
        location.href = 'dashboard.html';
      } catch (e) {
        err.textContent = e.message;
      } finally {
        btn.disabled = false;
      }
    });
    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('submit').click();
    });
  </script>
</body>
</html>
